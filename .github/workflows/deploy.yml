name: TailAdmin Laravel CI/CD
run-name: Build, Push and Deploy TailAdmin

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: "${{ secrets.DOCKER_USER }}/${{ secrets.DOCKER_USER }}-tailadmin-laravel:beta"

jobs:
  build-push-image:
    runs-on: self-hosted
    steps:
      - name: Free disk space
        run: |
          docker system prune -af --volumes
          sudo journalctl --vacuum-size=20M
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE_NAME .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push image
        run: docker push $IMAGE_NAME

  deploy:
    needs: build-push-image
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "DOCKER_USER=${{ secrets.DOCKER_USER }}" > .env

      - name: Stop existing container
        run: docker compose down || true

      - name: Pull latest image
        run: docker compose pull

      - name: Start container
        run: docker compose up -d

      - name: Check status
        run: docker compose ps

      - name: Check logs
        run: docker compose logs --tail 20
